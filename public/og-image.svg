<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph image — Copiloto.Digital
  Dimensiones estándar OG / Twitter card: 1200 x 630 px (1.91:1).
  SVG estático servido directamente; si alguna plataforma exige PNG, se
  rasteriza con resvg/sharp en build posterior.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Fondo dark -->
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#15151a"/>
    </linearGradient>
    <!-- Halo radial brand -->
    <radialGradient id="og-glow" cx="0.78" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#e61f3e" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#e61f3e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e61f3e" stop-opacity="0"/>
    </radialGradient>
    <!-- Logo gradient -->
    <linearGradient id="og-logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbccd2"/>
      <stop offset="55%" stop-color="#eb3350"/>
      <stop offset="100%" stop-color="#e61f3e"/>
    </linearGradient>
    <radialGradient id="og-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbccd2"/>
    </radialGradient>
  </defs>

  <!-- Fondo + halo -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <!-- Logo (anillo orbital + núcleo + dot) a la izquierda -->
  <g transform="translate(120 220)">
    <g transform="rotate(-22)">
      <ellipse cx="0" cy="0" rx="78" ry="34" fill="none" stroke="url(#og-logo)" stroke-width="6"/>
    </g>
    <circle cx="0" cy="0" r="20" fill="url(#og-core)"/>
    <circle cx="58" cy="-32" r="9" fill="#e61f3e"/>
  </g>

  <!-- Wordmark -->
  <text
    x="240"
    y="240"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="84"
    font-weight="700"
    fill="#fafafa"
    letter-spacing="-3"
  >Copiloto.Digital</text>

  <!-- Tagline -->
  <text
    x="240"
    y="300"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="32"
    font-weight="400"
    fill="#b8b8c4"
    letter-spacing="-0.5"
  >El copiloto IA para tu negocio local</text>

  <!-- Línea acento -->
  <rect x="240" y="340" width="120" height="4" rx="2" fill="#e61f3e"/>

  <!-- Sub-tagline -->
  <text
    x="240"
    y="400"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#8a8a98"
  >WhatsApp · CRM · Citas · Voz · Contenido</text>

  <!-- Partículas decorativas a la derecha -->
  <g fill="#fbccd2" opacity="0.65">
    <circle cx="950"  cy="120" r="3"/>
    <circle cx="1010" cy="180" r="2"/>
    <circle cx="1080" cy="100" r="2.5"/>
    <circle cx="1130" cy="220" r="3"/>
    <circle cx="980"  cy="280" r="2"/>
    <circle cx="1060" cy="340" r="2.5"/>
    <circle cx="1120" cy="430" r="2"/>
    <circle cx="980"  cy="480" r="3"/>
    <circle cx="1050" cy="520" r="2"/>
  </g>
  <g fill="#eb3350" opacity="0.85">
    <circle cx="1090" cy="260" r="4"/>
    <circle cx="970"  cy="380" r="3.5"/>
    <circle cx="1140" cy="320" r="3"/>
  </g>

  <!-- Footer URL -->
  <text
    x="120"
    y="570"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="22"
    font-weight="500"
    fill="#5a5a68"
    letter-spacing="1"
  >copiloto.digital</text>
</svg>
