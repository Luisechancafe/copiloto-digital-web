<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon Copiloto.Digital — anillo orbital con dot acento.
  Optimizado para 16-32 px. Funciona sobre fondos claros y oscuros gracias
  al gradiente brand (visible en ambos contextos).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fav-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbccd2"/>
      <stop offset="55%" stop-color="#eb3350"/>
      <stop offset="100%" stop-color="#e61f3e"/>
    </linearGradient>
    <radialGradient id="fav-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbccd2"/>
    </radialGradient>
  </defs>

  <!-- Anillo orbital: elipse rotada -->
  <g transform="translate(16 16) rotate(-25)">
    <ellipse cx="0" cy="0" rx="13" ry="6" fill="none" stroke="url(#fav-grad)" stroke-width="2.4"/>
  </g>

  <!-- Núcleo -->
  <circle cx="16" cy="16" r="3.2" fill="url(#fav-core)"/>

  <!-- Dot acento orbital -->
  <circle cx="26" cy="10" r="2.2" fill="#e61f3e"/>
</svg>
